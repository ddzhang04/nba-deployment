name: Production Healthcheck

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production healthcheck
        env:
          HEALTHCHECK_BASE_URL: ${{ vars.HEALTHCHECK_BASE_URL || 'https://nba-deployment.vercel.app' }}
          HEALTHCHECK_API_BASE_URL: ${{ vars.HEALTHCHECK_API_BASE_URL || '' }}
          HEALTHCHECK_TIMEOUT_MS: ${{ vars.HEALTHCHECK_TIMEOUT_MS || '25000' }}
          HEALTHCHECK_RETRIES: ${{ vars.HEALTHCHECK_RETRIES || '4' }}
        run: node scripts/healthcheck.js

