name: Refresh Player Images

on:
  schedule:
    # Daily at 10:20 UTC
    - cron: "20 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh player images
        run: node scripts/fetch-nba-player-images.js --targetsFrom=gameplayLists

      - name: Create Pull Request (if changed)
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/auto-refresh-player-images
          delete-branch: true
          commit-message: "chore: auto-refresh player image mapping"
          title: "chore: auto-refresh player image mapping"
          body: |
            Automated refresh of `public/player-images.json`.

            - Source: `scripts/fetch-nba-player-images.js`
            - Trigger: scheduled GitHub Action

            This PR was created automatically.
          labels: |
            automation
            data

      # Auto-merge the PR so changes land on main (and Vercel redeploys) without manual intervention.
      # Requires repository setting: Settings → General → Pull Requests → "Allow auto-merge" enabled.
      - name: Enable PR auto-merge (if created)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

